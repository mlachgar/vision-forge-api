version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-runtime:
        patterns:
          - fastapi
          - pydantic
          - pydantic-settings
          - uvicorn*
      python-ml-stack:
        patterns:
          - numpy
          - pillow
          - protobuf
          - sentencepiece
          - torch
          - transformers
      python-dev-tools:
        patterns:
          - httpx
          - mypy
          - pytest*
          - ruff

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
