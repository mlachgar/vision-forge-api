name: Docker Smoke

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: Docker smoke build (cpu-lite)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build cpu-full image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: vision-forge-api:ci-smoke
          build-args: |
            DEVICE=cpu
            BUNDLE_MODEL=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke checks
        env:
          PREDICT_TOKEN: vfk_predict_token_87654321fedcba
        run: python3 scripts/docker_smoke_test.py --image vision-forge-api:ci-smoke --config-dir config --data-dir data --image-path samples/cat.jpg --predict-token "$PREDICT_TOKEN" --timeout-seconds 600
