name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: vision-forge-api

jobs:
  docker-publish:
    name: Publish ${{ matrix.variant.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        variant:
          - id: cpu-lite
            device: cpu
            bundle_model: "false"
          - id: cpu-full
            device: cpu
            bundle_model: "true"
          - id: gpu-lite
            device: gpu
            bundle_model: "false"
          - id: gpu-full
            device: gpu
            bundle_model: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"

      - name: Resolve image coordinates
        id: image
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          namespace="${DOCKERHUB_NAMESPACE}"
          if [ -z "${namespace}" ]; then
            namespace="${DOCKERHUB_USERNAME}"
          fi
          if [ -z "${namespace}" ]; then
            echo "DOCKERHUB_NAMESPACE variable (or DOCKERHUB_USERNAME secret) must be set." >&2
            exit 1
          fi
          echo "image=${namespace}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        run: |
          python scripts/ci/compute_docker_tags.py \
            --event-name "${{ github.event_name }}" \
            --ref "${{ github.ref }}" \
            --variant "${{ matrix.variant.id }}" \
            --image "${{ steps.image.outputs.image }}"

      - name: Print publication plan
        run: |
          echo "Publish: ${{ steps.tags.outputs.publish }}"
          echo "Tags: ${{ steps.tags.outputs.tags }}"
          echo "Is release: ${{ steps.tags.outputs.is_release }}"

      - name: Validate release version against pyproject
        if: steps.tags.outputs.is_release == 'true'
        run: python scripts/ci/check_versions.py --tag "v${{ steps.tags.outputs.version }}"

      - name: Set up Docker Buildx
        if: steps.tags.outputs.publish == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: steps.tags.outputs.publish == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.tags.outputs.publish == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            DEVICE=${{ matrix.variant.device }}
            BUNDLE_MODEL=${{ matrix.variant.bundle_model }}
          labels: |
            org.opencontainers.image.title=vision-forge-api
            org.opencontainers.image.description=Production-ready FastAPI service for image tagging using SigLIP
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version || 'edge' }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha,scope=${{ matrix.variant.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.id }}

      - name: Trivy image scan (non-blocking)
        if: steps.tags.outputs.publish == 'true' && matrix.variant.id == 'cpu-full'
        continue-on-error: true
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: ${{ steps.tags.outputs.primary_tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
