name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type, Test
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12.13"
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-deps -e .
          python -m pip install ".[dev]"

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Format check
        run: python -m ruff format --check src tests scripts

      - name: Type check
        run: MYPYPATH=src python -m mypy --config-file mypy.ini

      - name: Validate configuration
        run: python scripts/validate_config.py --config-dir config --data-dir data

      - name: Run tests
        run: python -m pytest -q tests --junitxml test-results/pytest.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-report
          path: test-results/pytest.xml
          if-no-files-found: ignore

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Python dependency audit (non-blocking)
        continue-on-error: true
        run: |
          python -m pip install pip-audit==2.9.0
          python -m pip_audit
