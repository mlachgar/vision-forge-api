name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type, Test
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12.13"
      PYTHONPATH: src
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-deps -e .
          python -m pip install ".[dev]"

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Format check
        run: python -m ruff format --check src tests scripts

      - name: Type check
        run: MYPYPATH=src python -m mypy --config-file mypy.ini

      - name: Validate configuration
        run: python scripts/validate_config.py --config-dir config --data-dir data

      - name: Run tests
        run: |
          mkdir -p test-results
          python -m pytest -q tests --junitxml test-results/pytest.xml --cov=vision_forge_api --cov-report=xml:test-results/coverage.xml --cov-report=term-missing

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-report
          path: test-results/pytest.xml
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: test-results/coverage.xml
          if-no-files-found: ignore

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0

      - name: Python dependency audit (non-blocking)
        continue-on-error: true
        run: |
          python -m pip install pip-audit==2.9.0
          python -m pip_audit
