name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type, Test
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12.13"
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-deps -e .
          python -m pip install ".[dev]"

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Format check
        run: python -m ruff format --check src tests scripts

      - name: Type check
        run: MYPYPATH=src python -m mypy --config-file mypy.ini

      - name: Validate configuration
        run: python scripts/validate_config.py --config-dir config --data-dir data

      - name: Run tests
        run: python -m pytest -q tests --junitxml test-results/pytest.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-report
          path: test-results/pytest.xml
          if-no-files-found: ignore

      - name: Python dependency audit (non-blocking)
        continue-on-error: true
        run: |
          python -m pip install pip-audit==2.9.0
          python -m pip_audit

  docker-smoke:
    name: Docker smoke build (cpu-lite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build cpu-lite image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: false
          tags: vision-forge-api:ci-smoke
          build-args: |
            DEVICE=cpu
            BUNDLE_MODEL=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
