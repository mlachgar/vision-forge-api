repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
        files: ^(src|tests|scripts)/
      - id: ruff
        args: [--fix]
        files: ^(src|tests|scripts)/
      - id: ruff
        name: ruff-lint
        files: ^(src|tests|scripts)/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: ./.venv/bin/python -m mypy
        language: system
        pass_filenames: false
        files: ^src/
